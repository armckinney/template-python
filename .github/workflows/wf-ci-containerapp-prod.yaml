name: wf-ci-containerapp-prod

env:
  CONFIGURATION: 'containerapp'
  ENVIRONMENT: 'prod'
  APP_DOCKERFILE: 'app/Dockerfile'
  APP_IMAGE_TAG: 'app-latest'

on:
  pull_request:
    branches: [ main ]

jobs:
  container-build-and-push:
    uses: armckinney/cicd/.github/workflows/rwf-container-build-and-push.yaml@main

  lint:
    runs-on: ubuntu-latest
    needs: container-build-and-push
    container:
      image: ${{ needs.container-build-and-push.outputs.container_image }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Lint with ruff
      run: |
        uv run ruff check .
	        
    - name: Link with tf
      run: |
        uv run ty check .

    - name: Link with ruff format
      run: |
        uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: container-build-and-push
    container:
      image: ${{ needs.container-build-and-push.outputs.container_image }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Test with Pytest
      run: |
        uv run pytest .
